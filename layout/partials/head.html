{{ define "head" }}
{{ $PageData := index .DeepDataMerge.Templates .PageURL }}
{{if eq $PageData nil}}{{ $PageData = .TemplateData }}{{end}}
<!doctype html><html lang="en"><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{$PageData.Frontmatter.Title}}</title>
{{ if $PageData.LiveReload }}<script>const es=new EventSource("http://localhost:8000/events");es.onmessage=()=>location.reload();</script>{{ end }}
</head>
{{end}}
